---
# =============================================================================
# Astro-Stack — Docker Compose
# Services: astro-api, astro-worker-gpu0, astro-worker-gpu1, redis, postgres, traefik
# Supports standalone deployment (no external dependencies required)
# =============================================================================

x-astro-common: &astro-common
  build:
    context: .
    dockerfile: Dockerfile
  runtime: nvidia
  environment:
    # Application
    - APP_NAME=Astro-Stack
    - LOG_LEVEL=${LOG_LEVEL:-info}
    # GPU
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    # Auth (disabled by default; set AUTH_ENABLED=true to activate)
    - AUTH_ENABLED=${AUTH_ENABLED:-false}
    - JWT_SECRET=${JWT_SECRET:-change-me-in-production-min-16-chars}
    # Database — uses embedded postgres container
    - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://astro:astro@postgres:5432/astrostack}
    # Redis
    - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    # Ollama
    - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
    - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    # Storage paths (mounted volumes)
    - INBOX_PATH=/inbox
    - SESSIONS_PATH=/sessions
    - OUTPUT_PATH=/output
    - MODELS_PATH=/models
    # External tools
    - SIRIL_BINARY=siril-cli
    - ASTAP_BINARY=astap
    - ASTAP_STAR_DB_PATH=/opt/astap/stars
    # Pipeline
    - PIPELINE_MAX_RETRIES=3
    - SESSION_STABILITY_DELAY=30.0
  volumes:
    # Shared data directories — mount your actual storage paths here
    - ${INBOX_HOST_PATH:-./data/inbox}:/inbox
    - ${SESSIONS_HOST_PATH:-./data/sessions}:/sessions
    - ${OUTPUT_HOST_PATH:-./data/output}:/output
    # AI model weights — populated once via init-models.sh
    - ${MODELS_HOST_PATH:-./data/models}:/models
    # ASTAP star database (populated via init-models.sh)
    - astro_astap_stars:/opt/astap/stars
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - astro-net

services:
  # ── Traefik Reverse Proxy ────────────────────────────────────────────────────
  traefik:
    image: traefik:v3
    container_name: astro-traefik
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:-admin@example.com}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --log.level=${LOG_LEVEL:-info}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8081}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    environment:
      - TZ=UTC
    restart: unless-stopped
    networks:
      - astro-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_DASHBOARD_HOST:-traefik.localhost}`)"
      - "traefik.http.routers.dashboard.service=api@internal"

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: astro-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-astro}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-astro}
      - POSTGRES_DB=${POSTGRES_DB:-astrostack}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astro} -d ${POSTGRES_DB:-astrostack} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - astro-net

  # ── API Server ────────────────────────────────────────────────────────────────
  astro-api:
    <<: *astro-common
    container_name: astro-api
    command: ["/opt/venv/bin/python", "-m", "alembic", "upgrade", "head"]
    environment:
      - PATH=/opt/venv/bin:/usr/local/bin:/usr/bin:/bin
      - VIRTUAL_ENV=/opt/venv
      - APP_NAME=Astro-Stack
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-min-16-chars}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://astro:astro@postgres:5432/astrostack}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - INBOX_PATH=/inbox
      - SESSIONS_PATH=/sessions
      - OUTPUT_PATH=/output
      - MODELS_PATH=/models
      - SIRIL_BINARY=siril-cli
      - ASTAP_BINARY=astap
      - ASTAP_STAR_DB_PATH=/opt/astap/stars
      - PIPELINE_MAX_RETRIES=3
      - SESSION_STABILITY_DELAY=30.0
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.astro-api.rule=Host(`${TRAEFIK_HOST:-astro.localhost}`)"
      - "traefik.http.routers.astro-api.entrypoints=web"
      - "traefik.http.routers.astro-api.service=astro-api-service"
      - "traefik.http.services.astro-api-service.loadbalancer.server.port=8080"
      - "traefik.http.routers.astro-api-secure.rule=Host(`${TRAEFIK_HOST:-astro.localhost}`)"
      - "traefik.http.routers.astro-api-secure.entrypoints=websecure"
      - "traefik.http.routers.astro-api-secure.tls.certResolver=letsencrypt"
      - "traefik.http.routers.astro-api-secure.service=astro-api-service"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Worker — GPU 0 ───────────────────────────────────────────────────────────
  astro-worker-gpu0:
    <<: *astro-common
    container_name: astro-worker-gpu0
    command:
      - python
      - -m
      - arq
      - app.workers.settings.WorkerSettings
    environment:
      - APP_NAME=Astro-Stack
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-min-16-chars}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://astro:astro@postgres:5432/astrostack}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - INBOX_PATH=/inbox
      - SESSIONS_PATH=/sessions
      - OUTPUT_PATH=/output
      - MODELS_PATH=/models
      - SIRIL_BINARY=siril-cli
      - ASTAP_BINARY=astap
      - ASTAP_STAR_DB_PATH=/opt/astap/stars
      - PIPELINE_MAX_RETRIES=3
      - SESSION_STABILITY_DELAY=30.0
      # GPU assignment — this worker uses GPU 0
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - WORKER_GPU_DEVICE=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu, compute, utility]

  # ── Worker — GPU 1 ───────────────────────────────────────────────────────────
  astro-worker-gpu1:
    <<: *astro-common
    container_name: astro-worker-gpu1
    command:
      - python
      - -m
      - arq
      - app.workers.settings.WorkerSettings
    environment:
      - APP_NAME=Astro-Stack
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-min-16-chars}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://astro:astro@postgres:5432/astrostack}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - INBOX_PATH=/inbox
      - SESSIONS_PATH=/sessions
      - OUTPUT_PATH=/output
      - MODELS_PATH=/models
      - SIRIL_BINARY=siril-cli
      - ASTAP_BINARY=astap
      - ASTAP_STAR_DB_PATH=/opt/astap/stars
      - PIPELINE_MAX_RETRIES=3
      - SESSION_STABILITY_DELAY=30.0
      # GPU assignment — this worker uses GPU 1
      - NVIDIA_VISIBLE_DEVICES=1
      - CUDA_VISIBLE_DEVICES=1
      - WORKER_GPU_DEVICE=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu, compute, utility]

  # ── Redis ──────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: astro-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - astro-net

  # ── Model initialiser (runs once, then exits) ───────────────────────────────
  astro-init-models:
    <<: *astro-common
    container_name: astro-init-models
    command: ["/bin/bash", "/app/scripts/init-models.sh"]
    restart: "no"
    profiles:
      - init   # Only runs with: docker compose --profile init up

volumes:
  postgres_data:
  redis_data:
  traefik_certs:
  astro_astap_stars:

networks:
  astro-net:
    driver: bridge

# Enable NVIDIA GPU support for all services
x-gpu-common: &gpu-common
  runtime: nvidia
  environment:
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
